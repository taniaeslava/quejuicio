# QueJuicio — revisa a diario si hay tareas vencidas y manda push por FCM.
# GitHub Actions usa UTC: 06:00 UTC = 08:00 en Berlín en verano (CEST)
# y 07:00 en invierno (CET). Ajusta la hora aquí si les molesta el cambio.
name: Avisar tareas vencidas

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {} # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        working-directory: notify
        run: npm install --no-audit --no-fund

      - name: Enviar notificaciones
        working-directory: notify
        run: node index.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
